          additionalProperties:
            type: string
          nullable: true
          description: Environment variables to set when launching the agent.
        secrets:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Secrets to inject as environment variables when launching the agent. Map of environment variable names
