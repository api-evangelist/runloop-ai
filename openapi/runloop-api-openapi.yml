      deprecated: false
components:
  schemas:
    AgentCreateParameters:
      type: object
      additionalProperties: false
      description: Parameters for creating a new Agent.
      properties:
        name:
          type: string
          description: The name of the Agent.
        version:
          type: string
          nullable: true
          description: Optional version identifier for the Agent. For npm/pip sources this is typically a semver string (e.g.
            '2.0.65'). For git sources it can be a branch or tag. Semantics are user-defined for object sources.
        source:
          $ref: '#/components/schemas/AgentSource'
          nullable: true
          description: The source configuration for the Agent.
      required:
      - name
    AgentDevboxCountsView:
      type: object
      additionalProperties: false
      description: Devbox counts grouped by agent name. Used to efficiently fetch devbox counts for multiple agents in a single
        request.
      properties:
        counts:
          type: object
          additionalProperties:
            type: integer
            format: int32
          description: Map of agent name to devbox count. Each key is an agent name, and the value is the count of devboxes
            associated with that agent.
        total_count:
          type: integer
          format: int32
          description: Total count of devboxes across all agents in the result.
      required:
      - counts
      - total_count
    AgentListView:
      type: object
      additionalProperties: false
      description: A paginated list of Agents.
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentView'
          description: The list of Agents.
        has_more:
          type: boolean
          description: Whether there are more Agents to fetch.
        total_count:
          type: integer
          format: int32
          nullable: true
          description: The total count of Agents.
      required:
      - agents
      - has_more
    AgentMount:
      type: object
      additionalProperties: false
      properties:
        agent_id:
          type: string
          nullable: true
          description: The ID of the agent to mount. Either agent_id or name must be set.
        agent_name:
          type: string
          nullable: true
          description: The name of the agent to mount. Returns the most recent agent with a matching name if no agent id string
            provided. Either agent id or name must be set
        agent_path:
          type: string
          nullable: true
          description: Path to mount the agent on the Devbox. Required for git and object agents. Use absolute path (e.g.,
            /home/user/agent)
        auth_token:
          type: string
          nullable: true
          description: Optional auth token for private repositories. Only used for git agents.
        type:
          type: string
          enum:
          - agent_mount
          default: agent_mount
      required:
      - agent_id
      - agent_name
      - type
    AgentSource:
      type: object
      additionalProperties: false
      description: Agent source configuration.
      properties:
        type:
          type: string
          description: 'Source type: npm, pip, object, or git'
        npm:
          $ref: '#/components/schemas/NpmSource'
          nullable: true
          description: NPM source configuration
        pip:
          $ref: '#/components/schemas/PipSource'
          nullable: true
          description: Pip source configuration
        object:
          $ref: '#/components/schemas/ObjectSource'
          nullable: true
          description: Object store source configuration
        git:
          $ref: '#/components/schemas/GitSource'
          nullable: true
          description: Git source configuration
      required:
      - type
    AgentView:
      type: object
      additionalProperties: false
      description: An Agent represents a registered AI agent entity.
      properties:
        id:
          type: string
          description: The unique identifier of the Agent.
        name:
          type: string
          description: The name of the Agent.
        version:
          type: string
          nullable: true
          description: Optional version identifier for the Agent. For npm/pip sources this is typically a semver string (e.g.
            '2.0.65'). For git sources it can be a branch or tag. Omitted for object sources or when not provided.
        create_time_ms:
          type: integer
          format: int64
          description: The creation time of the Agent (Unix timestamp milliseconds).
        is_public:
          type: boolean
          description: Whether the Agent is publicly accessible.
        source:
          $ref: '#/components/schemas/AgentSource'
          nullable: true
          description: The source configuration for the Agent.
      required:
      - id
      - name
      - create_time_ms
      - is_public
    ApiAccessLevel:
      type: string
      enum:
      - ACCESS_LEVEL_NONE
      - ACCESS_LEVEL_READ
      - ACCESS_LEVEL_WRITE
    ApiKeyCreateParameters:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        expires_at_ms:
          type: integer
          format: int64
          nullable: true
    ApiKeyCreatedView:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        key_secret:
          type: string
        expires_at_ms:
          type: integer
          format: int64
          nullable: true
    ApiResourceType:
      type: string
      enum:
      - RESOURCE_TYPE_DEVBOXES
      - RESOURCE_TYPE_BLUEPRINTS
      - RESOURCE_TYPE_SNAPSHOTS
      - RESOURCE_TYPE_BENCHMARKS
      - RESOURCE_TYPE_SCENARIOS
      - RESOURCE_TYPE_REPO_CONNECTIONS
      - RESOURCE_TYPE_AGENTS
      - RESOURCE_TYPE_OBJECTS
      - RESOURCE_TYPE_ACCOUNT
    Architecture:
      type: string
      enum:
      - x86_64
      - arm64
    AstGrepScoringFunction:
      type: object
      additionalProperties: false
      description: AstGrepScoringFunction utilizes structured coach search for scoring.
      properties:
        lang:
          type: string
          description: The language of the pattern.
        search_directory:
          type: string
          description: The path to search.
        pattern:
          type: string
          description: AST pattern to match. Pattern will be passed to ast-grep using the commandline surround by double quotes
            ("), so make sure to use proper escaping (for example, \$\$\$).
        type:
          type: string
          enum:
          - ast_grep_scorer
          default: ast_grep_scorer
      required:
      - search_directory
      - pattern
      - type
    AuthMechanismView:
      type: object
      additionalProperties: false
      description: Defines how credentials are applied to HTTP requests when proxying through the gateway.
      properties:
        type:
          type: string
          description: 'The type of authentication mechanism: ''header'', ''bearer''.'
        key:
          type: string
          nullable: true
          description: 'For ''header'' type: the header name (e.g., ''x-api-key'').'
      required:
      - type
    AxonCreateParams:
      type: object
      additionalProperties: false
