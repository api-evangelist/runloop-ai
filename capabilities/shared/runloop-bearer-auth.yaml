naftiko: 1.0.0-alpha2
info:
  label: Runloop Bearer Auth (shared)
  description: Shared authentication block used by every Runloop capability. Reads RUNLOOP_API_KEY from the env namespace and places it in the Authorization header as a Bearer token.
  tags:
    - Runloop
    - Authentication
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      RUNLOOP_API_KEY: RUNLOOP_API_KEY
shared:
  authentication:
    type: bearer
    value: '{{env.RUNLOOP_API_KEY}}'
    placement: header
  baseUri: https://api.runloop.ai
