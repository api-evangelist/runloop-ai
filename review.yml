created: '2026-05-25'
modified: '2026-05-25'

review:
  tier: 1
  tier_rationale: >
    Runloop ships a tightly-scoped public OpenAPI 3.0.3 spec (119 endpoints, 14 resource groups),
    Stainless-generated Python and TypeScript SDKs, an interactive CLI, MCP server integration,
    GitHub Actions, an examples cookbook, documented pricing across compute/storage/coordination
    meters, public status page, security/compliance page (SOC 2 Type II + HIPAA + GDPR), and a
    rich llms.txt that maps the entire concept space. The OpenAPI is consistent (snake_case,
    /v1/ prefix, bearer auth) and SDK auto-generation is healthy. Founder pedigree (Google File
    System, Google Wallet, Index → Stripe) is strong. Documentation is on Mintlify, kept current,
    and includes tutorials, cookbooks, and an llms.txt for AI tooling.

  positives:
    - Public OpenAPI 3.0.3 spec with 119 endpoints; SDKs auto-generated by Stainless.
    - Two first-party SDKs (Python async-first, TypeScript), plus rl-cli, MCP server, Cursor rules.
    - Clear product surface — Devbox, Blueprint, Snapshot, Agent, Axon, Scenario/Benchmark, Object, Secret, Gateway Config, MCP Config, Network Policy, API Key.
    - Pricing fully published across compute (CPU/RAM), Blueprint Build, four storage SKUs, and Axon coordination at both per-hour and per-second granularity.
    - SOC 2 Type II, HIPAA, GDPR; VPC deployment for Enterprise.
    - Ships a usable eval framework out of the box (SWE-Bench Verified, SWE-smith) with run lifecycle, scenario aggregation, and scoring.
    - llms.txt is exemplary — concept index, gotchas, when-to-use-each-access-method, and links to every doc topic.
    - Examples cookbook, deploy-agent GitHub Action, AI Agent App Template, and Open-source ComputeSDK.

  gaps:
    - No published per-endpoint HTTP rate limits in the OpenAPI spec — clients rely on 429 backoff.
    - Scenario/ScenarioScorer surface is rich but documentation could go deeper on custom scorer authoring.
    - OpenAPI title is "RunLoop API" with mixed casing; brand uses "Runloop" elsewhere — minor inconsistency.
    - API version is "0.1" — would benefit from a clearer semantic-version posture as the surface stabilizes.

  signals:
    - github_org_repos: 60+ public repos including SDKs, CLI, Action, container/Bazel tooling, kata-containers fork.
    - first_party_sdks: [python, typescript]
    - api_spec: openapi-3.0.3
    - mcp_support: true
    - eval_framework: true
    - public_benchmarks: [SWE-Bench Verified, SWE-smith]
    - compliance: [SOC 2 Type II, HIPAA, GDPR]
    - founder_pedigree: [Google File System, Google Wallet, Index → Stripe]
    - pricing_transparency: high
    - public_status_page: https://status.runloop.ai
    - vpc_deployment: enterprise
